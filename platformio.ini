; PlatformIO Project Configuration File
;
; --------------------------------------------------
;  j4_display_right / SeeedStudio XIAO ESP32S3
;  Pot-label display (right, landscape) for Johnny 4
;  controller. Reads 4 pots (IRIS, COLOR, BRIGHTNESS,
;  VOLUME) via an ADS1115 and streams them to the TTGO
;  over UART; drives 3.5" ILI9488 480x320 SPI TFT.
; --------------------------------------------------
[env:xiao-esp32s3]
platform    = espressif32
board       = seeed_xiao_esp32s3
framework   = arduino

monitor_speed = 115200
upload_speed         = 115200
upload_protocol      = esptool
; XIAO ESP32S3 has native USB (no UART bridge). The esptool stub loader
; often fails flash comms over the USB-serial-JTAG link ("Unable to verify
; flash chip connection"), so skip it and use the ROM loader directly.
upload_flags         = --no-stub

build_flags =
  ; USB CDC as Serial (debug), leaves UART0 hardware pins free
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; TFT_eSPI -- ILI9488 @ 480x320
  -DUSER_SETUP_LOADED
  -DILI9488_DRIVER
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=480
  -DTFT_MISO=8
  -DTFT_MOSI=9
  -DTFT_SCLK=7
  -DTFT_CS=4
  -DTFT_DC=3
  -DTFT_RST=2
  -DTFT_BL=1
  -DTFT_BACKLIGHT_ON=HIGH
  -DSPI_FREQUENCY=27000000
  -DSPI_READ_FREQUENCY=20000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DLOAD_FONT6
  -DLOAD_FONT7
  -DLOAD_FONT8
  -DLOAD_GFXFF
  -DSMOOTH_FONT

lib_deps =
  https://github.com/Bodmer/TFT_eSPI.git
  RobTillaart/ADS1X15@0.3.13
